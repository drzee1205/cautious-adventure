<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Nelson-GPT: Smart Pediatric Medical Assistant powered by Nelson Textbook of Pediatrics" />
  <meta name="keywords" content="pediatric, medical, AI, assistant, healthcare, Nelson, textbook" />
  <meta name="author" content="Nelson-GPT Team" />
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#10a37f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Nelson-GPT" />
  
  <!-- Icons -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="mask-icon" href="/masked-icon.svg" color="#10a37f" />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <title>Nelson-GPT - Smart Pediatric Medical Assistant</title>
  
  <style>
    :root {
      --gpt-bg-light: #ffffff;
      --gpt-bg-dark: #212121;
      --gpt-primary: #10a37f;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    #root {
      min-height: 100vh;
      background-color: var(--gpt-bg-light);
    }
    
    .dark #root {
      background-color: var(--gpt-bg-dark);
    }
    
    /* Loading Animation */
    .loading-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--gpt-primary) 0%, #0d8a6f 100%);
    }
    
    .loading-content {
      text-align: center;
      color: white;
    }
    
    .loading-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }
    
    .loading-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .loading-subtitle {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 24px;
    }
    
    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    
    .loading-dot {
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: loadingDot 1.4s ease-in-out infinite both;
    }
    
    .loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-dot:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes loadingDot {
      0%, 80%, 100% { 
        transform: scale(0.8);
        opacity: 0.5;
      } 40% { 
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-container">
      <div class="loading-content">
        <div class="loading-logo">N</div>
        <h1 class="loading-title">Nelson-GPT</h1>
        <p class="loading-subtitle">Smart Pediatric Medical Assistant</p>
        <div class="loading-dots">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
